<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>V3RSUS — Predictor Variants</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
    background: #0b0b0a;
    color: #e8e5df;
    min-height: 100vh;
}

.bar {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.6rem 1.25rem;
    background: #111110;
    border-bottom: 1px solid rgba(232,229,223,0.08);
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
}
.bar .brand { font-weight: 700; letter-spacing: 0.22em; color: #a63d40; }
.bar .mode { display: flex; gap: 0.5rem; }
.mode button {
    font-family: inherit;
    background: transparent;
    color: rgba(232,229,223,0.6);
    border: 1px solid rgba(232,229,223,0.12);
    padding: 0.3rem 0.75rem;
    cursor: pointer;
    font-size: 0.58rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
}
.mode button.active { background: #a63d40; color: #fff; border-color: #a63d40; }

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1px;
    background: rgba(232,229,223,0.08);
    height: calc(100vh - 40px);
}
.pane {
    display: flex;
    flex-direction: column;
    background: #0b0b0a;
    min-width: 0;
    min-height: 0;
}
.pane-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.5rem 0.85rem;
    background: rgba(17,17,16,0.9);
    border-bottom: 1px solid rgba(232,229,223,0.06);
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(232,229,223,0.65);
}
.pane-head .label { font-weight: 600; color: #e8e5df; }
.pane-head a {
    color: rgba(232,229,223,0.5);
    text-decoration: none;
    font-size: 0.55rem;
    padding: 0.25rem 0.5rem;
    border: 1px solid rgba(232,229,223,0.1);
}
.pane-head a:hover { color: #a63d40; border-color: #a63d40; }
.pane iframe {
    flex: 1;
    border: none;
    width: 100%;
    background: #111;
}

/* Solo mode */
body.solo .grid { grid-template-columns: 1fr; grid-template-rows: 1fr; }
body.solo .pane { display: none; }
body.solo .pane.active { display: flex; }

@media (max-width: 900px) {
    .grid { grid-template-columns: 1fr; height: auto; }
    .pane iframe { height: 80vh; }
}
</style>
</head>
<body>

<div class="bar">
    <span class="brand">V3RSUS &middot; Predictor Variants</span>
    <span style="color: rgba(232,229,223,0.4); font-size: 0.62rem; letter-spacing: 0.08em">compare &middot; click to open full-screen</span>
    <div class="mode">
        <button data-mode="grid" class="active">Grid</button>
        <button data-mode="a">A</button>
        <button data-mode="b">B</button>
        <button data-mode="c">C</button>
        <button data-mode="d">D</button>
    </div>
</div>

<div class="grid">
    <div class="pane" data-pane="a">
        <div class="pane-head">
            <span><span class="label">A &middot; Research Paper</span> &middot; current</span>
            <a href="/predict.html" target="_blank">open &rarr;</a>
        </div>
        <iframe src="/predict.html" loading="lazy"></iframe>
    </div>
    <div class="pane" data-pane="b">
        <div class="pane-head">
            <span><span class="label">B &middot; Terminal</span> &middot; bloomberg/CRT</span>
            <a href="/predict-terminal.html" target="_blank">open &rarr;</a>
        </div>
        <iframe src="/predict-terminal.html" loading="lazy"></iframe>
    </div>
    <div class="pane" data-pane="c">
        <div class="pane-head">
            <span><span class="label">C &middot; Magazine</span> &middot; editorial spread</span>
            <a href="/predict-magazine.html" target="_blank">open &rarr;</a>
        </div>
        <iframe src="/predict-magazine.html" loading="lazy"></iframe>
    </div>
    <div class="pane" data-pane="d">
        <div class="pane-head">
            <span><span class="label">D &middot; Brutalist</span> &middot; fight poster</span>
            <a href="/predict-brutalist.html" target="_blank">open &rarr;</a>
        </div>
        <iframe src="/predict-brutalist.html" loading="lazy"></iframe>
    </div>
</div>

<script>
const buttons = document.querySelectorAll('.mode button');
const panes = document.querySelectorAll('.pane');
buttons.forEach(btn => btn.addEventListener('click', () => {
    buttons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const mode = btn.dataset.mode;
    if (mode === 'grid') {
        document.body.classList.remove('solo');
        panes.forEach(p => p.classList.remove('active'));
    } else {
        document.body.classList.add('solo');
        panes.forEach(p => p.classList.toggle('active', p.dataset.pane === mode));
    }
}));
</script>

</body>
</html>
